name: Build iLinux ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: debian:bookworm
      options: --privileged

    steps:
      - name: Install git and tools
        run: |
          apt-get update -qq
          apt-get install -y git wget sassc python3 ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build dependencies
        run: |
          apt-get install -y live-build debootstrap xorriso squashfs-tools \
            isolinux syslinux-common syslinux-utils \
            dosfstools mtools gtk2-engines-murrine gnome-themes-extra

      - name: Download and install WhiteSur themes into filesystem overlay
        shell: bash
        run: |
          CHROOT_ROOT="config/includes.chroot"
          THEME_DIR="${CHROOT_ROOT}/usr/share/themes"
          ICON_DIR="${CHROOT_ROOT}/usr/share/icons"
          WALL_DIR="${CHROOT_ROOT}/usr/share/backgrounds/ilinux"
          mkdir -p "$THEME_DIR" "$ICON_DIR" "$WALL_DIR"

          echo "=== Downloading WhiteSur GTK Theme ==="
          wget -q "https://github.com/vinceliuice/WhiteSur-gtk-theme/archive/refs/heads/master.tar.gz" -O /tmp/gtk.tar.gz
          cd /tmp && tar xzf gtk.tar.gz
          cd WhiteSur-gtk-theme-master
          bash install.sh -d "$THEME_DIR" -c Light -c Dark -l || bash install.sh -d "$THEME_DIR" || echo "GTK theme install.sh had issues"
          cd /tmp && rm -rf WhiteSur-gtk-theme-master gtk.tar.gz

          echo "=== Downloading WhiteSur Icon Theme ==="
          wget -q "https://github.com/vinceliuice/WhiteSur-icon-theme/archive/refs/heads/master.tar.gz" -O /tmp/icons.tar.gz
          cd /tmp && tar xzf icons.tar.gz
          cd WhiteSur-icon-theme-master
          bash install.sh -d "$ICON_DIR" || echo "Icon theme install.sh had issues"
          cd /tmp && rm -rf WhiteSur-icon-theme-master icons.tar.gz

          echo "=== Downloading WhiteSur Cursors ==="
          wget -q "https://github.com/vinceliuice/WhiteSur-cursors/archive/refs/heads/master.tar.gz" -O /tmp/cursors.tar.gz
          cd /tmp && tar xzf cursors.tar.gz
          cd WhiteSur-cursors-master
          mkdir -p "$ICON_DIR/WhiteSur-cursors/cursors"
          if [ -d dist/cursors ]; then
            cp -r dist/* "$ICON_DIR/WhiteSur-cursors/"
          elif [ -d build/WhiteSur-cursors ]; then
            cp -r build/WhiteSur-cursors/* "$ICON_DIR/WhiteSur-cursors/"
          else
            bash install.sh 2>/dev/null || echo "Cursor install skipped"
          fi
          cd /tmp && rm -rf WhiteSur-cursors-master cursors.tar.gz

          echo "=== Generating wallpaper ==="
          python3 -c "
          import struct, zlib, os
          w, h = 1920, 1080
          rows = []
          for y in range(h):
              row = b'\x00'
              for x in range(w):
                  r = min(255, max(0, int(20 + (y/h)*40 + (x/w)*30)))
                  g = min(255, max(0, int(20 + (y/h)*30 + (x/w)*50)))
                  b = min(255, max(0, int(80 + (y/h)*100 + (x/w)*60)))
                  row += struct.pack('BBB', r, g, b)
              rows.append(row)
          def mk(w, h, rows):
              def ch(ct, d):
                  c = ct + d
                  return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              return b'\x89PNG\r\n\x1a\n' + ch(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + ch(b'IDAT', zlib.compress(b''.join(rows), 9)) + ch(b'IEND', b'')
          d = 'config/includes.chroot/usr/share/backgrounds/ilinux'
          os.makedirs(d, exist_ok=True)
          open(f'{d}/default.png', 'wb').write(mk(w, h, rows))
          print('Wallpaper generated.')
          "

          echo "=== Theme files installed ==="
          ls "$THEME_DIR"/ 2>/dev/null || echo "No themes in $THEME_DIR"
          ls "$ICON_DIR"/ 2>/dev/null || echo "No icons in $ICON_DIR"

      - name: Configure live-build
        run: |
          mkdir -p build && cd build

          lb config \
            --distribution bookworm \
            --debian-installer false \
            --archive-areas "main contrib non-free non-free-firmware" \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootappend-live "boot=live components quiet splash" \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot "http://deb.debian.org/debian" \
            --mirror-binary "http://deb.debian.org/debian" \
            --mirror-chroot-security "http://deb.debian.org/debian-security" \
            --mirror-binary-security "http://deb.debian.org/debian-security" \
            --security true \
            --linux-flavours "amd64" \
            --linux-packages "linux-image" \
            --iso-application "iLinux" \
            --iso-publisher "iLinux Project" \
            --iso-volume "iLinux 1.0" \
            --memtest none \
            --win32-loader false

          cp ../config/package-lists/ilinux.list.chroot config/package-lists/
          cp -a ../config/includes.chroot/* config/includes.chroot/ 2>/dev/null || true

          mkdir -p config/hooks/live
          cp -a ../config/hooks/live/* config/hooks/live/ 2>/dev/null || true

          mkdir -p config/bootloaders/grub-pc
          cp ../config/bootloaders/grub-pc/grub.cfg config/bootloaders/grub-pc/ 2>/dev/null || true

      - name: Build ISO
        run: |
          cd build
          lb build

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ilinux-1.0-amd64
          path: build/*.iso
          retention-days: 30
          compression-level: 0
          if-no-files-found: warn

      - name: Show ISO info
        if: always()
        run: |
          ls -lh build/*.iso 2>/dev/null || echo "No ISO found - check build step logs"
