name: Build iLinux ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools debian-archive-keyring isolinux syslinux-common syslinux-utils

      - name: Configure live-build
        run: |
          mkdir -p build && cd build

          export DEBOOTSTRAP_OPTIONS="--keyring=/usr/share/keyrings/debian-archive-keyring.gpg"

          sudo -E lb config \
            --mode debian \
            --system live \
            --distribution bookworm \
            --parent-distribution bookworm \
            --debian-installer false \
            --archive-areas "main contrib non-free non-free-firmware" \
            --parent-archive-areas "main contrib non-free non-free-firmware" \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootappend-live "boot=live components quiet splash" \
            --mirror-bootstrap "http://deb.debian.org/debian" \
            --parent-mirror-bootstrap "http://deb.debian.org/debian" \
            --mirror-chroot "http://deb.debian.org/debian" \
            --parent-mirror-chroot "http://deb.debian.org/debian" \
            --mirror-binary "http://deb.debian.org/debian" \
            --parent-mirror-binary "http://deb.debian.org/debian" \
            --security false \
            --linux-flavours "none" \
            --linux-packages "none" \
            --iso-application "iLinux" \
            --iso-publisher "iLinux Project" \
            --iso-volume "iLinux 1.0" \
            --memtest none \
            --win32-loader false

          # Add correct Bookworm security repo as custom archive
          echo "deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" | \
            sudo tee config/archives/security.list.chroot > /dev/null
          sudo cp config/archives/security.list.chroot config/archives/security.list.binary

          sudo cp ../config/package-lists/ilinux.list.chroot config/package-lists/
          sudo cp -a ../config/includes.chroot/* config/includes.chroot/ 2>/dev/null || true

          sudo mkdir -p config/hooks/live
          sudo cp -a ../config/hooks/live/* config/hooks/live/ 2>/dev/null || true

          sudo mkdir -p config/bootloaders/grub-pc
          sudo cp ../config/bootloaders/grub-pc/grub.cfg config/bootloaders/grub-pc/ 2>/dev/null || true

      - name: Build ISO
        run: |
          cd build
          export DEBOOTSTRAP_OPTIONS="--keyring=/usr/share/keyrings/debian-archive-keyring.gpg"
          sudo -E lb build

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ilinux-1.0-amd64
          path: build/*.iso
          retention-days: 30
          compression-level: 0
          if-no-files-found: warn

      - name: Show ISO info
        if: always()
        run: |
          ls -lh build/*.iso 2>/dev/null || echo "No ISO found - check build step logs"
