set timeout=5
set default=0

insmod all_video
insmod gfxterm
insmod png

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

set color_normal=white/black
set color_highlight=white/dark-gray

set menu_color_normal=white/black
set menu_color_highlight=black/white

menuentry "iLinux 1.0 - Live Session" --class os {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd.img
}

menuentry "iLinux 1.0 - Live (Safe Graphics)" --class os {
    linux /live/vmlinuz boot=live components quiet splash nomodeset
    initrd /live/initrd.img
}

menuentry "iLinux 1.0 - Install" --class os {
    linux /live/vmlinuz boot=live components quiet splash install
    initrd /live/initrd.img
}

menuentry "Memory Test (memtest86+)" {
    linux /live/memtest
}
